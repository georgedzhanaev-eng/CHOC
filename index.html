<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Stream · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-app:#f4f7fb;--bg-card:#ffffff;--bg-elev:#f1f5f9;--bg-hover:#e7eef5;--bg-subtle:#f8fafc;
      --border:#e2e8f0;--border-strong:#cbd5e1;
      --text-primary:#0f172a;--text-secondary:#475569;--text-soft:#64748b;--text-muted:#94a3b8;
      --accent:#0891b2;--accent-dark:#0e7490;--accent-soft:#ecfeff;--accent-mid:#cffafe;
      --success:#059669;--success-soft:#d1fae5;--danger:#dc2626;--danger-soft:#fee2e2;
      --r-sm:6px;--r:10px;
      --shadow-sm:0 1px 2px rgba(15,23,42,.04);
      --shadow:0 4px 12px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
      --shadow-lg:0 12px 32px rgba(15,23,42,.12),0 4px 8px rgba(15,23,42,.04);
      --font-mono:'JetBrains Mono',monospace;--font-display:'Manrope',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;background:var(--bg-app);color:var(--text-primary);
      font-family:var(--font-mono);font-size:13px;line-height:1.5;
      font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;
      background-image:radial-gradient(ellipse 800px 400px at top right,rgba(8,145,178,.05),transparent 60%),
        radial-gradient(ellipse 600px 300px at top left,rgba(99,102,241,.04),transparent 60%);
      background-attachment:fixed;}
    .shell{max-width:1500px;margin:0 auto;padding:24px 22px 60px}

    /* Логотип */
    .org-logo-bar{display:flex;align-items:center;margin-bottom:16px;position:relative;min-height:54px}
    .org-logo-bar img{height:54px;width:auto;object-fit:contain;border-radius:4px;flex-shrink:0}
    .org-logo-bar .org-title{position:absolute;left:50%;transform:translateX(-50%);
      font-family:var(--font-display);font-weight:800;font-size:clamp(16px,3vw,22px);
      letter-spacing:.08em;text-transform:uppercase;color:var(--text-primary);white-space:nowrap}

    /* Шапка */
    header.top{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;
      margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border)}
    .logo-block{display:flex;align-items:center;gap:14px}
    .pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);
      box-shadow:0 0 0 4px rgba(8,145,178,.18);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.75)}}
    h1{font-family:var(--font-display);font-size:clamp(22px,4vw,30px);font-weight:800;
      color:var(--text-primary);letter-spacing:-.025em}
    h1 span{color:var(--accent)}
    .meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .meta-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);
      letter-spacing:.04em;text-transform:uppercase;font-weight:600}
    .meta-item .value{color:var(--text-secondary);font-weight:700}
    .spinner{width:14px;height:14px;border:2px solid var(--border-strong);border-top-color:var(--accent);
      border-radius:50%;animation:spin .7s linear infinite;display:none}
    .spinner.active{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .status-ok{color:var(--success);font-size:14px}
    .status-err{color:var(--danger);font-size:14px}

    /* Ошибка */
    #error-bar{display:none;align-items:center;gap:10px;padding:11px 16px;
      background:var(--danger-soft);border:1px solid #fca5a5;border-radius:var(--r);
      color:#991b1b;font-size:12px;margin-bottom:18px}
    #error-bar.visible{display:flex}
    #error-bar .ml-auto{margin-left:auto;color:#b91c1c;opacity:.8}

    /* KPI */
    .kpi-grid{display:grid;gap:14px;margin-bottom:18px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
    .kpi-card{position:relative;padding:18px 22px;background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden;transition:transform .2s,box-shadow .2s}
    .kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
    .kpi-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;
      background:var(--c-accent,var(--accent));border-radius:var(--r) 0 0 var(--r)}
    .kpi-label{font-family:var(--font-display);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
      color:var(--text-muted);margin-bottom:10px;font-weight:700}
    .kpi-value{font-family:var(--font-display);font-weight:800;font-size:clamp(24px,3.2vw,32px);
      color:var(--text-primary);line-height:1.05;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
    .kpi-unit{font-family:var(--font-display);font-size:.55em;color:var(--text-soft);font-weight:600;margin-left:4px}
    .kpi-sub{margin-top:8px;font-size:11px;color:var(--text-soft);font-family:var(--font-display);font-weight:500}
    .kpi-sub b{color:var(--c-accent,var(--accent));font-weight:700}

    /* Карточки */
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);
      box-shadow:var(--shadow-sm);padding:18px 20px}
    .card-title{font-family:var(--font-display);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
      color:var(--text-soft);font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .card-title .em{color:var(--accent)}

    /* Фильтры */
    .filter-panel{padding:16px 20px;margin-bottom:18px}
    .filter-row-main{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    .filter-section-label{font-family:var(--font-display);font-size:10px;letter-spacing:.1em;
      text-transform:uppercase;color:var(--text-muted);font-weight:700}
    .filter-divider{width:1px;height:22px;background:var(--border)}

    /* Dropdown */
    .dropdown{position:relative;display:inline-block}
    .dropdown-trigger{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-sm);
      padding:8px 12px 8px 14px;display:inline-flex;align-items:center;gap:8px;
      font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--text-primary);
      cursor:pointer;transition:all .12s;min-width:200px;justify-content:space-between}
    .dropdown-trigger:hover{border-color:var(--border-strong);background:var(--bg-hover)}
    .dropdown.open .dropdown-trigger{border-color:var(--accent);background:var(--accent-soft);
      box-shadow:0 0 0 3px var(--accent-mid)}
    .dropdown.has-selection .dropdown-trigger{border-color:var(--accent);color:var(--accent-dark)}
    .dropdown-label-wrap{display:flex;align-items:center;gap:8px;min-width:0}
    .dropdown-label-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .dropdown-badge{background:var(--accent);color:#fff;border-radius:999px;padding:1px 8px;
      font-size:10px;font-weight:700;min-width:20px;text-align:center;font-variant-numeric:tabular-nums}
    .dropdown-badge[hidden]{display:none}
    .dropdown-arrow{font-size:9px;color:var(--text-muted);transition:transform .15s;flex-shrink:0}
    .dropdown.open .dropdown-arrow{transform:rotate(180deg);color:var(--accent)}
    .dropdown-panel{position:absolute;top:calc(100% + 6px);left:0;width:320px;max-height:460px;
      background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);
      box-shadow:var(--shadow-lg);z-index:100;display:none;flex-direction:column;overflow:hidden}
    .dropdown.open .dropdown-panel{display:flex}
    .dropdown-search{padding:10px;border-bottom:1px solid var(--border)}
    .dropdown-search input{width:100%;background:var(--bg-subtle);border:1px solid var(--border);
      border-radius:var(--r-sm);padding:7px 11px;font-family:var(--font-mono);font-size:12px;
      color:var(--text-primary);outline:none;transition:all .15s}
    .dropdown-search input::placeholder{color:var(--text-muted)}
    .dropdown-search input:focus{border-color:var(--accent);background:#fff}
    .dropdown-options{overflow:auto;flex:1;padding:4px 0;scrollbar-width:thin}
    .dropdown-options::-webkit-scrollbar{width:6px}
    .dropdown-options::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
    .dropdown-option{display:grid;grid-template-columns:18px 1fr auto;gap:10px;align-items:center;
      padding:7px 14px;cursor:pointer;font-size:12px;transition:background .1s;user-select:none}
    .dropdown-option:hover{background:var(--bg-elev)}
    .dropdown-option .checkmark{width:16px;height:16px;border:1.5px solid var(--border-strong);
      border-radius:4px;display:flex;align-items:center;justify-content:center;color:transparent;
      font-size:11px;font-weight:700;transition:all .1s;flex-shrink:0}
    .dropdown-option.selected .checkmark{background:var(--accent);border-color:var(--accent);color:#fff}
    .dropdown-option.pos .label{color:var(--success);font-weight:500}
    .dropdown-option.neg .label{color:var(--danger);font-weight:500}
    .dropdown-option.pos.selected .checkmark{background:var(--success);border-color:var(--success)}
    .dropdown-option.neg.selected .checkmark{background:var(--danger);border-color:var(--danger)}
    .dropdown-option .label{color:var(--text-primary);white-space:nowrap;overflow:hidden;
      text-overflow:ellipsis;font-family:var(--font-mono)}
    .dropdown-option .count{color:var(--text-muted);font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
    .dropdown-empty{padding:24px 16px;text-align:center;color:var(--text-muted);font-size:12px}
    .dropdown-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;
      justify-content:space-between;align-items:center;background:var(--bg-subtle)}
    .dropdown-clear{background:none;border:none;color:var(--text-soft);cursor:pointer;
      font-family:var(--font-display);font-size:10px;font-weight:700;text-transform:uppercase;
      letter-spacing:.06em;padding:4px 8px;border-radius:4px;transition:all .1s}
    .dropdown-clear:hover{color:var(--danger);background:var(--danger-soft)}
    .dropdown-clear:disabled{opacity:.35;cursor:default}
    .dropdown-clear:disabled:hover{color:var(--text-soft);background:none}
    .dropdown-info{color:var(--text-muted);font-size:11px;font-variant-numeric:tabular-nums;
      font-family:var(--font-display);font-weight:600}

    /* Чипы */
    .chip-group{display:flex;flex-wrap:wrap;gap:5px}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;background:var(--bg-elev);
      border:1px solid var(--border);border-radius:999px;font-size:11px;font-family:var(--font-mono);
      color:var(--text-secondary);cursor:pointer;transition:all .12s;user-select:none;white-space:nowrap}
    .chip:hover{background:var(--bg-hover);border-color:var(--border-strong);color:var(--text-primary)}
    .chip.active{background:var(--accent);border-color:var(--accent-dark);color:#fff;
      box-shadow:0 2px 6px rgba(8,145,178,.3)}
    .chip .chip-count{font-size:10px;font-weight:700;opacity:.65;padding-left:4px;
      border-left:1px solid currentColor;font-variant-numeric:tabular-nums}
    .chip.active .chip-count{opacity:.9}

    .search-row{display:flex;gap:10px;align-items:center;margin-top:14px;padding-top:14px;
      border-top:1px dashed var(--border)}
    #search{flex:1;background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-sm);
      padding:10px 14px;color:var(--text-primary);font-family:var(--font-mono);font-size:13px;
      transition:border-color .15s,box-shadow .15s}
    #search::placeholder{color:var(--text-muted)}
    #search:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-mid)}
    .clear-filters{background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);
      color:var(--text-soft);font-family:var(--font-display);font-size:11px;font-weight:700;
      padding:10px 14px;cursor:pointer;transition:all .15s;letter-spacing:.04em;text-transform:uppercase}
    .clear-filters:hover{color:var(--danger);border-color:var(--danger);background:var(--danger-soft)}
    .clear-filters[hidden]{display:none}

    /* Donut */
    .charts-grid{display:grid;gap:14px;margin-bottom:18px;grid-template-columns:minmax(280px,1fr)}
    .donut-svg{flex-shrink:0}
    .donut-center{font-family:var(--font-display);font-weight:800;fill:var(--text-primary);font-size:24px;letter-spacing:-.02em}
    .donut-center-label{fill:var(--text-muted);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
      font-weight:700;font-family:var(--font-display)}
    .donut-hint{font-size:10px;color:var(--text-muted);font-family:var(--font-display);font-weight:600;
      letter-spacing:.04em;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)}
    .legend{flex:1;min-width:220px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:4px}
    .legend-row{display:grid;grid-template-columns:16px 10px 1fr auto;gap:9px;align-items:center;
      font-size:12px;cursor:pointer;padding:6px 10px;border-radius:var(--r-sm);transition:background .12s;user-select:none}
    .legend-row:hover{background:var(--bg-elev)}
    .legend-row.selected{background:var(--accent-soft)}
    .legend-row.dimmed{opacity:.45}
    .legend-check{width:14px;height:14px;border:1.5px solid var(--border-strong);border-radius:3px;
      display:flex;align-items:center;justify-content:center;color:transparent;font-size:10px;
      font-weight:700;transition:all .1s}
    .legend-row.selected .legend-check{background:var(--accent);border-color:var(--accent);color:#fff}
    .legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}
    .legend-label{color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .legend-value{color:var(--text-soft);font-weight:700;font-variant-numeric:tabular-nums}

    /* === ГРУППЫ СТАТУСОВ (Исполнено / Приоритет / НПО) === */
    .sg-grid{display:grid;gap:14px;margin-bottom:18px;grid-template-columns:repeat(3,1fr)}
    @media(max-width:900px){.sg-grid{grid-template-columns:1fr}}
    .sg-card{position:relative;padding:20px;overflow:hidden}
    .sg-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;
      border-radius:var(--r) 0 0 var(--r);background:var(--sg-color,var(--accent))}
    .sg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .sg-title{font-family:var(--font-display);font-weight:800;font-size:14px;letter-spacing:.06em;
      text-transform:uppercase;color:var(--sg-color,var(--accent))}
    .sg-count{font-family:var(--font-display);font-weight:800;font-size:28px;color:var(--text-primary);
      letter-spacing:-.03em;font-variant-numeric:tabular-nums}
    .sg-count .sg-unit{font-size:13px;font-weight:600;color:var(--text-soft);margin-left:3px}
    .sg-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
    .sg-metric{background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 10px}
    .sg-metric-label{font-family:var(--font-display);font-size:9px;letter-spacing:.08em;
      text-transform:uppercase;color:var(--text-muted);font-weight:700}
    .sg-metric-value{font-family:var(--font-display);font-size:14px;font-weight:800;
      color:var(--text-primary);margin-top:2px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
    .sg-metric-unit{font-size:10px;color:var(--text-soft);font-weight:600}
    .sg-status-list{display:flex;flex-direction:column;gap:6px}
    .sg-status-row{display:grid;grid-template-columns:minmax(80px,1fr) 2.5fr auto;gap:10px;align-items:center;
      font-size:12px;padding:4px 0}
    .sg-status-name{color:var(--text-primary);font-weight:600;white-space:nowrap;overflow:hidden;
      text-overflow:ellipsis;font-family:var(--font-display);font-size:11px}
    .sg-bar-track{height:22px;background:var(--bg-elev);border-radius:6px;overflow:hidden;position:relative}
    .sg-bar-fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);
      background:linear-gradient(90deg,var(--sg-color),var(--sg-color-light,var(--sg-color)));opacity:.75}
    .sg-bar-fill:hover{opacity:1}
    .sg-status-count{font-family:var(--font-display);font-weight:800;color:var(--sg-color,var(--accent));
      font-variant-numeric:tabular-nums;font-size:14px;min-width:28px;text-align:right}

    /* Рейтинги */
    .rating-grid{display:grid;gap:14px;margin-bottom:18px;grid-template-columns:repeat(auto-fit,minmax(460px,1fr))}
    @media(max-width:1000px){.rating-grid{grid-template-columns:1fr}}
    .rating-card{position:relative;padding:18px 20px}
    .rating-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;border-radius:var(--r) 0 0 var(--r)}
    .rating-card.pos::before{background:var(--success)}
    .rating-card.neg::before{background:var(--danger)}
    .rating-header{margin-bottom:14px}
    .rating-title{font-family:var(--font-display);font-weight:800;font-size:17px;letter-spacing:-.02em;
      margin-bottom:4px;display:flex;align-items:center;gap:8px}
    .rating-card.pos .rating-title{color:var(--success)}
    .rating-card.neg .rating-title{color:var(--danger)}
    .rating-subtitle{font-family:var(--font-display);font-size:11px;color:var(--text-muted);
      letter-spacing:.04em;text-transform:uppercase;font-weight:600}
    .rating-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 0;
      margin-bottom:10px;border-bottom:1px dashed var(--border)}
    .rating-controls .dropdown-trigger{min-width:170px}
    .rating-controls .dropdown-panel{width:280px}
    .metric-tabs{display:inline-flex;background:var(--bg-elev);border-radius:var(--r-sm);padding:3px;gap:2px}
    .metric-tab{background:none;border:none;padding:6px 12px;font-family:var(--font-display);
      font-size:11px;font-weight:600;color:var(--text-soft);cursor:pointer;border-radius:4px;
      transition:all .15s;letter-spacing:.02em}
    .metric-tab:hover{color:var(--text-primary)}
    .metric-tab.active{background:var(--bg-card);color:var(--accent);
      box-shadow:0 1px 3px rgba(15,23,42,.08);font-weight:700}
    .rating-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
    .rating-stat{background:var(--bg-subtle);border-radius:var(--r-sm);padding:8px 10px;border:1px solid var(--border)}
    .rating-stat-label{font-family:var(--font-display);font-size:9px;letter-spacing:.08em;
      text-transform:uppercase;color:var(--text-muted);font-weight:700}
    .rating-stat-value{font-family:var(--font-display);font-size:15px;font-weight:800;
      color:var(--text-primary);margin-top:2px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
    .rating-stat-unit{font-size:11px;color:var(--text-soft);font-weight:600}
    .bar-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto;
      padding-right:4px;scrollbar-width:thin}
    .bar-list::-webkit-scrollbar{width:6px}
    .bar-list::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
    .bar-row{display:grid;grid-template-columns:minmax(110px,1.1fr) 2fr minmax(85px,auto);gap:10px;
      align-items:center;cursor:pointer;padding:6px 6px;border-radius:var(--r-sm);transition:background .12s}
    .bar-row:hover{background:var(--bg-elev)}
    .bar-row.active{background:var(--accent-soft)}
    .bar-name{color:var(--text-primary);font-weight:600;font-size:12px;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;font-family:var(--font-display)}
    .bar-rank{display:inline-block;font-family:var(--font-display);font-size:10px;font-weight:700;
      color:var(--text-muted);min-width:18px;font-variant-numeric:tabular-nums;margin-right:4px}
    .bar-track{height:10px;background:var(--bg-elev);border-radius:5px;overflow:hidden}
    .bar-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.4,0,.2,1)}
    .bar-fill.pos{background:linear-gradient(90deg,#10b981,#34d399)}
    .bar-fill.neg{background:linear-gradient(90deg,#dc2626,#f59e0b)}
    .bar-values{text-align:right;font-family:var(--font-display);line-height:1.25}
    .bar-primary{font-size:13px;font-weight:800;color:var(--text-primary);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
    .bar-primary .unit{font-size:10px;font-weight:600;color:var(--text-soft);margin-left:2px}
    .bar-secondary{font-size:10px;color:var(--text-muted);font-weight:500;margin-top:1px;
      font-variant-numeric:tabular-nums;white-space:nowrap}
    .rating-empty{text-align:center;padding:24px 12px;color:var(--text-muted);font-size:12px}

    /* Активные фильтры */
    .active-filters{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px;
      padding:12px 16px;background:var(--accent-soft);border:1px solid var(--accent-mid);
      border-radius:var(--r);animation:slideUp .25s ease both}
    .active-filters-label{font-family:var(--font-display);font-size:11px;font-weight:700;
      color:var(--accent-dark);letter-spacing:.04em;text-transform:uppercase;margin-right:6px}
    .active-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px 4px 12px;
      background:var(--bg-card);border:1px solid var(--accent);border-radius:999px;font-size:11px;
      font-family:var(--font-mono);color:var(--accent-dark);font-weight:600;cursor:default;
      transition:all .12s;box-shadow:0 1px 3px rgba(8,145,178,.12)}
    .active-tag .tag-group{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
      color:var(--text-muted);font-family:var(--font-display)}
    .active-tag .tag-remove{display:inline-flex;align-items:center;justify-content:center;
      width:16px;height:16px;border-radius:50%;background:var(--accent-mid);color:var(--accent-dark);
      font-size:10px;cursor:pointer;transition:all .12s;border:none;font-weight:700;padding:0;line-height:1}
    .active-tag .tag-remove:hover{background:var(--danger);color:#fff}

    /* Таблица */
    .row-count{font-size:11px;color:var(--text-muted);margin-bottom:10px;letter-spacing:.04em;padding:0 4px}
    .row-count strong{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
    .table-wrap{width:100%;overflow:auto;background:var(--bg-card);border:1px solid var(--border);
      border-radius:var(--r);box-shadow:var(--shadow);max-height:70vh}
    table{width:100%;border-collapse:collapse;min-width:600px}
    thead tr{background:var(--bg-subtle);position:sticky;top:0;z-index:2}
    th{padding:12px 14px;text-align:left;font-family:var(--font-display);font-size:10px;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;color:var(--text-soft);border-bottom:2px solid var(--border);
      white-space:nowrap;user-select:none;cursor:pointer;transition:background .12s,color .12s}
    th:hover{background:var(--bg-elev);color:var(--accent)}
    th:not(:last-child){border-right:1px solid var(--border)}
    th .sort-ind{display:inline-block;margin-left:6px;color:var(--text-muted);font-size:9px;transition:color .12s}
    th.sorted,th.sorted .sort-ind{color:var(--accent)}
    th.numeric{text-align:right}
    tbody tr{transition:background .1s;border-bottom:1px solid var(--border)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:nth-child(even){background:var(--bg-subtle)}
    tbody tr:hover{background:var(--accent-soft)}
    td{padding:10px 14px;color:var(--text-primary);white-space:nowrap;max-width:340px;overflow:hidden;
      text-overflow:ellipsis;font-size:12px}
    td:not(:last-child){border-right:1px solid var(--border)}
    td.row-num{color:var(--text-muted);font-size:11px;min-width:40px;text-align:right;user-select:none;font-variant-numeric:tabular-nums}
    td.numeric{text-align:right;font-variant-numeric:tabular-nums}
    .status-badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;
      background:var(--bg-elev);color:var(--text-secondary)}
    .status-badge.pos{background:var(--success-soft);color:#065f46}
    .status-badge.neg{background:var(--danger-soft);color:#991b1b}
    .empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
    .empty-state .icon{font-size:32px;margin-bottom:10px}
    footer{margin-top:28px;text-align:center;font-size:10px;color:var(--text-muted);letter-spacing:.05em}
    @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .kpi-card,.card{animation:slideUp .35s ease both}
    @media(max-width:700px){header.top{flex-direction:column;align-items:flex-start}.meta{gap:10px}
      .dropdown-trigger{min-width:0}.dropdown-panel{width:280px}.rating-summary{grid-template-columns:1fr}}
  </style>
</head>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vR0WE7EQQGvgGEgNyP-uXDNG7pGjspEVn-5IFc5mk0NfnKQ9fTstE_2ypUg7b2y064OgwkOtmwrLdG8/pub?output=csv';
const REFRESH_INTERVAL=60000;
const POSITIVE_STATUSES=['контракт заключен','не подлежит сносу','опубликовано','снесен','снос своими силами'];
const NEGATIVE_STATUSES=['запрет','наследство','подлежит расселению','публикация','расселен','розыск','сво','суд'];
const POS_SET=new Set(POSITIVE_STATUSES),NEG_SET=new Set(NEGATIVE_STATUSES);
const PALETTE=['#0891b2','#10b981','#f59e0b','#ec4899','#8b5cf6','#14b8a6','#ef4444','#6366f1','#84cc16','#f97316','#06b6d4','#a855f7'];
const RATING_METRICS=[{id:'count',label:'Кол-во',short:'шт.'},{id:'volume',label:'Объём',short:'м³'},{id:'cost',label:'Стоимость',short:'₽'}];

// Три группы статусов для карточек
const STATUS_GROUPS=[
  {id:'executed',title:'Исполнено',color:'#059669',colorLight:'#6ee7b7',
   statuses:['снесен','контракт заключен','опубликовано','снос своими силами','не подлежит сносу']},
  {id:'priority',title:'Приоритет',color:'#d97706',colorLight:'#fcd34d',
   statuses:['публикация','расселен']},
  {id:'npo',title:'НПО',color:'#dc2626',colorLight:'#fca5a5',
   statuses:['запрет','сво','суд','подлежит расселению','розыск','наследство']},
];

const state={headers:[],rows:[],numericCols:new Set(),
  districtCol:-1,statusCol:-1,yearCol:-1,volumeCol:-1,costCol:-1,
  filters:new Map(),search:'',
  ratingStatuses:new Set(POSITIVE_STATUSES),antiRatingStatuses:new Set(NEGATIVE_STATUSES),
  ratingMetric:'count',antiRatingMetric:'count',sortCol:null,sortDir:'asc',statusCaseMap:new Map()};

const $=id=>document.getElementById(id);
const elSpinner=$('spinner'),elStatus=$('status-icon'),elLastUpd=$('last-update'),elNextUpd=$('next-update');
const elErrBar=$('error-bar'),elErrMsg=$('error-msg'),elKpiGrid=$('kpi-grid');
const elFilterRow=$('filter-row'),elSearch=$('search'),elClearBtn=$('clear-filters');
const elCharts=$('charts-grid'),elSgGrid=$('sg-grid'),elRating=$('rating-grid');
const elActiveFilters=$('active-filters'),elTableWrap=$('table-wrap');
const elRowCount=$('row-count'),elHead=$('table-head'),elBody=$('table-body');

// CSV parser
function parseCSV(t){const R=[];let r=[],c='',q=false;for(let i=0;i<t.length;i++){const ch=t[i],nx=t[i+1];
if(q){if(ch==='"'&&nx==='"'){c+='"';i++}else if(ch==='"')q=false;else c+=ch}
else{if(ch==='"')q=true;else if(ch===','){r.push(c.trim());c=''}
else if(ch==='\r'&&nx==='\n'){r.push(c.trim());R.push(r);r=[];c='';i++}
else if(ch==='\n'){r.push(c.trim());R.push(r);r=[];c=''}else c+=ch}}
if(c.length||r.length){r.push(c.trim());R.push(r)}
while(R.length&&R[R.length-1].every(v=>v===''))R.pop();return R}

function toNumber(v){if(v==null||v==='')return null;const c=String(v).replace(/\s/g,'').replace(',','.');
if(!/^-?\d+(\.\d+)?$/.test(c))return null;const n=parseFloat(c);return isNaN(n)?null:n}
function detectNumericCols(h,rows){const s=new Set();h.forEach((_,i)=>{let t=0,nc=0;
for(const r of rows){const v=r[i];if(v==null||v==='')continue;t++;if(toNumber(v)!==null)nc++}
if(t>0&&nc/t>=.8)s.add(i)});return s}
function findColumn(...needles){for(const n of needles){const lc=n.toLowerCase();
const i=state.headers.findIndex(h=>h&&h.toLowerCase().includes(lc));if(i>=0)return i}return -1}
const fmtFull=n=>n==null?'—':new Intl.NumberFormat('ru-RU',{maximumFractionDigits:2}).format(n);
function fmtShortParts(n){if(n==null)return{num:'—',unit:''};const a=Math.abs(n);
if(a>=1e9)return{num:(n/1e9).toFixed(2).replace('.',','),unit:' млрд'};
if(a>=1e6)return{num:(n/1e6).toFixed(2).replace('.',','),unit:' млн'};
if(a>=1e3)return{num:(n/1e3).toFixed(1).replace('.',','),unit:' тыс'};
return{num:new Intl.NumberFormat('ru-RU',{maximumFractionDigits:1}).format(n),unit:''}}
function fmtShort(n){const p=fmtShortParts(n);return p.num+p.unit}
const escHtml=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function pluralRow(n){const v=n%100;if(v>=11&&v<=19)return 'строк';const r=v%10;
if(r===1)return 'строка';if(r>=2&&r<=4)return 'строки';return 'строк'}
const norm=v=>String(v||'').toLowerCase().trim();
function statusKind(s){const n=norm(s);if(POS_SET.has(n))return'pos';if(NEG_SET.has(n))return'neg';return''}
function statusColor(s,fi=0){const n=norm(s);
if(POS_SET.has(n)){const g=['#059669','#10b981','#22c55e','#34d399','#6ee7b7'];return g[POSITIVE_STATUSES.indexOf(n)%g.length]}
if(NEG_SET.has(n)){const r=['#dc2626','#ef4444','#f87171','#fb923c','#f59e0b','#fbbf24','#a855f7','#ec4899'];return r[NEGATIVE_STATUSES.indexOf(n)%r.length]}
return PALETTE[fi%PALETTE.length]}

function applyFilters(rows,exceptCol=null){const q=state.search.toLowerCase().trim();
return rows.filter(r=>{for(const[col,set]of state.filters){if(col===exceptCol)continue;
const v=(r[col]||'').trim()||'—';if(!set.has(v))return false}
if(q&&!r.some(c=>String(c).toLowerCase().includes(q)))return false;return true})}

function applySort(rows){if(state.sortCol==null)return rows;const col=state.sortCol;
const isNum=state.numericCols.has(col);const sign=state.sortDir==='asc'?1:-1;
return[...rows].sort((a,b)=>{const va=a[col]||'',vb=b[col]||'';
if(isNum){const na=toNumber(va),nb=toNumber(vb);if(na==null&&nb==null)return 0;
if(na==null)return 1;if(nb==null)return-1;return(na-nb)*sign}return va.localeCompare(vb,'ru')*sign})}

function toggleFilter(colIdx,value){if(!state.filters.has(colIdx))state.filters.set(colIdx,new Set());
const set=state.filters.get(colIdx);if(set.has(value))set.delete(value);else set.add(value);
if(set.size===0)state.filters.delete(colIdx);
if(colIdx===state.statusCol)syncGlobalFilterToRatingStatuses();onFiltersChanged()}

function clearAllFilters(){state.filters.clear();state.search='';elSearch.value='';closeAllDropdowns();
state.ratingStatuses=new Set(POSITIVE_STATUSES);state.antiRatingStatuses=new Set(NEGATIVE_STATUSES);onFiltersChanged()}

function syncRatingStatusesToGlobalFilter(){if(state.statusCol<0)return;
const combined=new Set([...state.ratingStatuses,...state.antiRatingStatuses]);
const all=[...POSITIVE_STATUSES,...NEGATIVE_STATUSES];
if(all.every(s=>combined.has(s))){state.filters.delete(state.statusCol)}
else if(combined.size===0){state.filters.set(state.statusCol,new Set(['__none__']))}
else{const actual=new Set();for(const s of combined){const a=state.statusCaseMap.get(s);if(a)actual.add(a)}
if(actual.size>0)state.filters.set(state.statusCol,actual)}}

function syncGlobalFilterToRatingStatuses(){const af=state.filters.get(state.statusCol);
if(!af){state.ratingStatuses=new Set(POSITIVE_STATUSES);state.antiRatingStatuses=new Set(NEGATIVE_STATUSES)}
else{const lw=new Set([...af].map(v=>norm(v)));
state.ratingStatuses=new Set(POSITIVE_STATUSES.filter(s=>lw.has(s)));
state.antiRatingStatuses=new Set(NEGATIVE_STATUSES.filter(s=>lw.has(s)))}}

// Dropdown factory
function closeAllDropdowns(){document.querySelectorAll('.dropdown.open').forEach(d=>d.classList.remove('open'))}
document.addEventListener('click',e=>{if(!e.target.closest('.dropdown'))closeAllDropdowns()});

function createDropdown(opts){const{label,getOptions,getSelected,onToggle,onClear,showSearch=false,colorize=false,width=320}=opts;
let sq='';const c=document.createElement('div');c.className='dropdown';
c.innerHTML=`<button class="dropdown-trigger" type="button"><span class="dropdown-label-wrap">
<span class="dropdown-label-text">${escHtml(label)}</span><span class="dropdown-badge" hidden>0</span>
</span><span class="dropdown-arrow">▼</span></button>
<div class="dropdown-panel" style="width:${width}px">
${showSearch?'<div class="dropdown-search"><input type="text" placeholder="🔍  Поиск..." autocomplete="off" /></div>':''}
<div class="dropdown-options"></div>
<div class="dropdown-footer"><button class="dropdown-clear" type="button">Очистить</button>
<span class="dropdown-info"></span></div></div>`;
const trigger=c.querySelector('.dropdown-trigger'),badge=c.querySelector('.dropdown-badge');
const panel=c.querySelector('.dropdown-panel'),optEl=c.querySelector('.dropdown-options');
const clrBtn=c.querySelector('.dropdown-clear'),infoEl=c.querySelector('.dropdown-info');
const sInp=showSearch?c.querySelector('.dropdown-search input'):null;

function refresh(){const allOpts=getOptions();const selected=getSelected();
const q=sq.toLowerCase().trim();const filtered=q?allOpts.filter(([v])=>String(v).toLowerCase().includes(q)):allOpts;
if(!filtered.length){optEl.innerHTML='<div class="dropdown-empty">Ничего не найдено</div>'}
else{optEl.innerHTML=filtered.map(([v,cnt])=>{const k=colorize?statusKind(v):'';const sel=selected.has(v);
return`<div class="dropdown-option ${k} ${sel?'selected':''}" data-val="${escHtml(v)}">
<span class="checkmark">✓</span><span class="label" title="${escHtml(v)}">${escHtml(v)}</span>
<span class="count">${cnt}</span></div>`}).join('');
optEl.querySelectorAll('.dropdown-option').forEach(o=>o.addEventListener('click',()=>onToggle(o.dataset.val)))}
if(!selected.size){badge.hidden=true;c.classList.remove('has-selection');clrBtn.disabled=true}
else{badge.hidden=false;badge.textContent=selected.size;c.classList.add('has-selection');clrBtn.disabled=false}
infoEl.textContent=`${selected.size} из ${allOpts.length}`}

trigger.addEventListener('click',e=>{e.stopPropagation();const w=c.classList.contains('open');
closeAllDropdowns();if(!w){c.classList.add('open');if(sInp)setTimeout(()=>sInp.focus(),30)}});
panel.addEventListener('click',e=>e.stopPropagation());
if(sInp)sInp.addEventListener('input',e=>{sq=e.target.value;refresh()});
clrBtn.addEventListener('click',e=>{e.stopPropagation();if(onClear)onClear()});
refresh();return{el:c,refresh}}

const refreshCallbacks=[];
function onFiltersChanged(scroll=true){renderKPIs();renderDonut();renderStatusGroups();renderActiveFilters();renderTable();
refreshCallbacks.forEach(fn=>fn());elClearBtn.hidden=!(state.filters.size>0||state.search);
if(scroll&&(state.filters.size>0||state.search))elActiveFilters.scrollIntoView({behavior:'smooth',block:'start'})}

function renderKPIs(){const filtered=applyFilters(state.rows);const cards=[];
cards.push({label:'Всего домов',parts:{num:fmtFull(filtered.length),unit:''},
sub:filtered.length!==state.rows.length?`из <b>${fmtFull(state.rows.length)}</b> в источнике`:'',color:PALETTE[0]});
if(state.districtCol>=0){const u=new Set();for(const r of filtered){const v=(r[state.districtCol]||'').trim();if(v)u.add(v)}
cards.push({label:'Округа',parts:{num:String(u.size),unit:''},sub:'',color:'#8b5cf6'})}
const numCols=[...state.numericCols].filter(i=>{const h=(state.headers[i]||'').toLowerCase().trim();
return!(h==='№'||h==='n'||h==='#')&&!h.includes('дотац')&&!h.includes('год')}).slice(0,2);
numCols.forEach((ci,i)=>{let sum=0,cnt=0;for(const r of filtered){const n=toNumber(r[ci]);if(n!=null){sum+=n;cnt++}}
cards.push({label:`Σ  ${state.headers[ci]}`,parts:fmtShortParts(sum),sub:'',color:PALETTE[(i+2)%PALETTE.length]})});
elKpiGrid.innerHTML=cards.map(c=>`<div class="kpi-card" style="--c-accent:${c.color}">
<div class="kpi-label">${escHtml(c.label)}</div>
<div class="kpi-value">${c.parts.num}${c.parts.unit?`<span class="kpi-unit">${c.parts.unit}</span>`:''}</div>
${c.sub?`<div class="kpi-sub">${c.sub}</div>`:''}</div>`).join('')}

function renderFilters(){elFilterRow.innerHTML='';
const lbl=document.createElement('span');lbl.className='filter-section-label';lbl.textContent='Фильтры';elFilterRow.appendChild(lbl);
if(state.districtCol>=0){const dd=createDropdown({label:'Городской округ',showSearch:true,width:320,
getOptions:()=>{const c=new Map();for(const r of state.rows){const v=(r[state.districtCol]||'').trim()||'—';c.set(v,(c.get(v)||0)+1)}return[...c.entries()].sort((a,b)=>b[1]-a[1])},
getSelected:()=>state.filters.get(state.districtCol)||new Set(),
onToggle:v=>toggleFilter(state.districtCol,v),
onClear:()=>{if(state.filters.has(state.districtCol)){state.filters.delete(state.districtCol);onFiltersChanged()}}});
elFilterRow.appendChild(dd.el);refreshCallbacks.push(dd.refresh)}
if(state.statusCol>=0){const dd=createDropdown({label:'Статус',colorize:true,width:300,
getOptions:()=>{const c=new Map();for(const r of state.rows){const v=(r[state.statusCol]||'').trim()||'—';c.set(v,(c.get(v)||0)+1)}return[...c.entries()].sort((a,b)=>b[1]-a[1])},
getSelected:()=>state.filters.get(state.statusCol)||new Set(),
onToggle:v=>toggleFilter(state.statusCol,v),
onClear:()=>{if(state.filters.has(state.statusCol)){state.filters.delete(state.statusCol);onFiltersChanged()}}});
elFilterRow.appendChild(dd.el);refreshCallbacks.push(dd.refresh)}
if(state.yearCol>=0){const div=document.createElement('span');div.className='filter-divider';elFilterRow.appendChild(div);
const yl=document.createElement('span');yl.className='filter-section-label';yl.textContent='Год дотации';elFilterRow.appendChild(yl);
const g=document.createElement('div');g.className='chip-group';elFilterRow.appendChild(g);
function rebuildYearChips(){const c=new Map();for(const r of state.rows){const v=(r[state.yearCol]||'').trim()||'—';c.set(v,(c.get(v)||0)+1)}
const entries=[...c.entries()].sort((a,b)=>a[0].localeCompare(b[0]));const active=state.filters.get(state.yearCol)||new Set();
g.innerHTML=entries.map(([v,cnt])=>`<button class="chip ${active.has(v)?'active':''}" data-val="${escHtml(v)}">${escHtml(v)}<span class="chip-count">${cnt}</span></button>`).join('');
g.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>toggleFilter(state.yearCol,ch.dataset.val)))}
rebuildYearChips();refreshCallbacks.push(rebuildYearChips)}}

function renderDonut(){if(state.statusCol<0){elCharts.innerHTML='';return}
const baseRows=applyFilters(state.rows,state.statusCol);const counts=new Map();
for(const r of baseRows){const v=(r[state.statusCol]||'').trim()||'—';counts.set(v,(counts.get(v)||0)+1)}
const groups=[...counts.entries()].map(([l,c],i,a)=>({label:l,count:c,color:statusColor(l,a.findIndex(([x])=>x===l))})).sort((a,b)=>b.count-a.count);
const total=groups.reduce((s,g)=>s+g.count,0)||1;const r=65,cx=80,cy=80,C=2*Math.PI*r;
const af=state.filters.get(state.statusCol);const hasF=af&&af.size>0;let offset=0;
const segs=groups.map(g=>{const len=(g.count/total)*C;const isSel=af?af.has(g.label):false;
const seg={...g,da:`${len} ${C-len}`,doff:-offset,isSel,op:hasF&&!isSel?.25:1};offset+=len;return seg});
const selTotal=hasF?segs.filter(s=>s.isSel).reduce((a,s)=>a+s.count,0):total;
const bg=getComputedStyle(document.documentElement).getPropertyValue('--bg-elev').trim();
elCharts.innerHTML=`<div class="card"><div class="card-title">Распределение по <span class="em">статусам</span></div>
<div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap"><div>
<svg class="donut-svg" width="160" height="160" viewBox="0 0 160 160">
<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${bg}" stroke-width="20"/>
${segs.map(s=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="20"
stroke-opacity="${s.op}" stroke-dasharray="${s.da}" stroke-dashoffset="${s.doff}"
transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .6s,stroke-dashoffset .6s,stroke-opacity .3s"/>`).join('')}
<text x="${cx}" y="${cy-2}" text-anchor="middle" class="donut-center">${selTotal}</text>
<text x="${cx}" y="${cy+16}" text-anchor="middle" class="donut-center-label">${hasF?'выбрано':'записей'}</text></svg>
<div class="donut-hint">↓ Клик по строке — выбрать несколько статусов</div></div>
<div class="legend" style="flex:1">${segs.map(s=>`<div class="legend-row ${s.isSel?'selected':''} ${hasF&&!s.isSel?'dimmed':''}" data-val="${escHtml(s.label)}">
<span class="legend-check">✓</span><span class="legend-swatch" style="background:${s.color}"></span>
<span class="legend-label" title="${escHtml(s.label)}">${escHtml(s.label)}</span>
<span class="legend-value">${s.count}</span></div>`).join('')}</div></div></div>`;
elCharts.querySelectorAll('.legend-row').forEach(row=>row.addEventListener('click',()=>toggleFilter(state.statusCol,row.dataset.val)))}

// === ТРИ КАРТОЧКИ: ИСПОЛНЕНО / ПРИОРИТЕТ / НПО ===
function renderStatusGroups(){if(state.statusCol<0){elSgGrid.innerHTML='';return}
const filtered=applyFilters(state.rows);
elSgGrid.innerHTML=STATUS_GROUPS.map(grp=>{
const matchRows=filtered.filter(r=>grp.statuses.includes(norm(r[state.statusCol])));
const count=matchRows.length;
let volSum=0,costSum=0;
for(const r of matchRows){
if(state.volumeCol>=0){const n=toNumber(r[state.volumeCol]);if(n!=null)volSum+=n}
if(state.costCol>=0){const n=toNumber(r[state.costCol]);if(n!=null)costSum+=n}}
const volP=fmtShortParts(volSum),costP=fmtShortParts(costSum);
// Подсчёт по каждому статусу
const perStatus=grp.statuses.map(s=>{let cnt=0;for(const r of matchRows)if(norm(r[state.statusCol])===s)cnt++;return{name:s,count:cnt}}).filter(x=>x.count>0).sort((a,b)=>b.count-a.count);
return`<div class="card sg-card" style="--sg-color:${grp.color};--sg-color-light:${grp.colorLight}">
<div class="sg-header"><div class="sg-title">${escHtml(grp.title)}</div>
<div class="sg-count">${count}<span class="sg-unit">шт.</span></div></div>
<div class="sg-metrics">
${state.volumeCol>=0?`<div class="sg-metric"><div class="sg-metric-label">Объём</div>
<div class="sg-metric-value">${volP.num}<span class="sg-metric-unit">${volP.unit} м³</span></div></div>`:''}
${state.costCol>=0?`<div class="sg-metric"><div class="sg-metric-label">Стоимость</div>
<div class="sg-metric-value">${costP.num}<span class="sg-metric-unit">${costP.unit} ₽</span></div></div>`:''}
</div>
<div class="sg-status-list">${(()=>{const maxC=Math.max(...perStatus.map(s=>s.count),1);return perStatus.map(s=>{
const w=(s.count/maxC*100).toFixed(1);
return`<div class="sg-status-row">
<div class="sg-status-name" title="${escHtml(s.name)}">${escHtml(s.name)}</div>
<div class="sg-bar-track"><div class="sg-bar-fill" style="width:${w}%"></div></div>
<div class="sg-status-count">${s.count}</div></div>`}).join('')})()}</div></div>`}).join('')}

// === Рейтинги ===
function computeDistrictStats(activeStatuses){const base=applyFilters(state.rows,state.statusCol);const map=new Map();
for(const r of base){const st=norm(r[state.statusCol]);if(!activeStatuses.has(st))continue;
const d=(r[state.districtCol]||'').trim()||'—';if(!map.has(d))map.set(d,{count:0,volume:0,cost:0});const g=map.get(d);
g.count++;if(state.volumeCol>=0){const v=toNumber(r[state.volumeCol]);if(v!=null)g.volume+=v}
if(state.costCol>=0){const v=toNumber(r[state.costCol]);if(v!=null)g.cost+=v}}
return[...map.entries()].map(([l,m])=>({label:l,...m}))}

function buildRatingCard(kind){const isPos=kind==='pos';
const title=isPos?'▲ Рейтинг округов':'▼ Антирейтинг округов';
const subtitle=isPos?'статусы с положительной динамикой':'проблемные статусы и обременения';
const fixedList=isPos?POSITIVE_STATUSES:NEGATIVE_STATUSES;
const card=document.createElement('div');card.className=`card rating-card ${kind}`;
card.innerHTML=`<div class="rating-header"><div class="rating-title">${title}</div>
<div class="rating-subtitle">${subtitle}</div></div>
<div class="rating-controls"></div><div class="rating-summary"></div><div class="bar-list"></div>`;
const controlsEl=card.querySelector('.rating-controls');
const summaryEl=card.querySelector('.rating-summary');const barsEl=card.querySelector('.bar-list');

const statusDropdown=createDropdown({label:'Статусы',colorize:true,width:280,
getOptions:()=>fixedList.map(s=>{let c=0;for(const r of state.rows)if(norm(r[state.statusCol])===s)c++;return[s,c]}),
getSelected:()=>isPos?state.ratingStatuses:state.antiRatingStatuses,
onToggle:v=>{const set=isPos?state.ratingStatuses:state.antiRatingStatuses;
if(set.has(v))set.delete(v);else set.add(v);syncRatingStatusesToGlobalFilter();onFiltersChanged()},
onClear:()=>{const set=isPos?state.ratingStatuses:state.antiRatingStatuses;set.clear();syncRatingStatusesToGlobalFilter();onFiltersChanged()}});
controlsEl.appendChild(statusDropdown.el);

const tabsEl=document.createElement('div');tabsEl.className='metric-tabs';controlsEl.appendChild(tabsEl);

function renderTabs(){const cur=isPos?state.ratingMetric:state.antiRatingMetric;
tabsEl.innerHTML=RATING_METRICS.map(m=>{if(m.id==='volume'&&state.volumeCol<0)return'';
if(m.id==='cost'&&state.costCol<0)return'';
return`<button class="metric-tab ${m.id===cur?'active':''}" data-metric="${m.id}">${m.label}</button>`}).join('');
tabsEl.querySelectorAll('.metric-tab').forEach(b=>b.addEventListener('click',()=>{
if(isPos)state.ratingMetric=b.dataset.metric;else state.antiRatingMetric=b.dataset.metric;renderTabs();renderBody()}))}

function renderBody(){const as=isPos?state.ratingStatuses:state.antiRatingStatuses;
const metric=isPos?state.ratingMetric:state.antiRatingMetric;const stats=computeDistrictStats(as);
const totals=stats.reduce((a,s)=>({count:a.count+s.count,volume:a.volume+s.volume,cost:a.cost+s.cost}),{count:0,volume:0,cost:0});
const vp=fmtShortParts(totals.volume),cp=fmtShortParts(totals.cost);
summaryEl.innerHTML=`<div class="rating-stat"><div class="rating-stat-label">Записей</div>
<div class="rating-stat-value">${fmtFull(totals.count)}</div></div>
${state.volumeCol>=0?`<div class="rating-stat"><div class="rating-stat-label">Объём</div>
<div class="rating-stat-value">${vp.num}<span class="rating-stat-unit">${vp.unit} м³</span></div></div>`:''}
${state.costCol>=0?`<div class="rating-stat"><div class="rating-stat-label">Стоимость</div>
<div class="rating-stat-value">${cp.num}<span class="rating-stat-unit">${cp.unit} ₽</span></div></div>`:''}`;

const sorted=stats.filter(s=>s[metric]>0).sort((a,b)=>b[metric]-a[metric]);
if(!sorted.length){barsEl.innerHTML='<div class="rating-empty">Нет данных по выбранным статусам</div>';return}
const maxVal=Math.max(...sorted.map(s=>s[metric]),1);
barsEl.innerHTML=sorted.map((s,i)=>{const v=s[metric];const w=(v/maxVal*100).toFixed(1);
const isDA=state.filters.has(state.districtCol)&&state.filters.get(state.districtCol).has(s.label);
let pri='';if(metric==='count')pri=`${fmtFull(v)}<span class="unit"> шт.</span>`;
else if(metric==='volume'){const p=fmtShortParts(v);pri=`${p.num}<span class="unit">${p.unit} м³</span>`}
else{const p=fmtShortParts(v);pri=`${p.num}<span class="unit">${p.unit} ₽</span>`}
const extras=[];if(metric!=='count')extras.push(`${fmtFull(s.count)} шт.`);
if(metric!=='volume'&&state.volumeCol>=0){const p=fmtShortParts(s.volume);extras.push(`${p.num}${p.unit} м³`)}
if(metric!=='cost'&&state.costCol>=0){const p=fmtShortParts(s.cost);extras.push(`${p.num}${p.unit} ₽`)}
return`<div class="bar-row ${isDA?'active':''}" data-district="${escHtml(s.label)}">
<div class="bar-name" title="${escHtml(s.label)}"><span class="bar-rank">${i+1}.</span>${escHtml(s.label)}</div>
<div class="bar-track"><div class="bar-fill ${kind}" style="width:${w}%"></div></div>
<div class="bar-values"><div class="bar-primary">${pri}</div>
<div class="bar-secondary">${extras.join(' · ')}</div></div></div>`}).join('');
barsEl.querySelectorAll('.bar-row').forEach(r=>r.addEventListener('click',()=>toggleFilter(state.districtCol,r.dataset.district)))}
renderTabs();renderBody();return{el:card,refresh:()=>{statusDropdown.refresh();renderTabs();renderBody()}}}

function renderRatings(){elRating.innerHTML='';if(state.districtCol<0||state.statusCol<0)return;
const p=buildRatingCard('pos'),n=buildRatingCard('neg');
elRating.appendChild(p.el);elRating.appendChild(n.el);
refreshCallbacks.push(p.refresh);refreshCallbacks.push(n.refresh)}

function renderActiveFilters(){const hasF=state.filters.size>0||state.search;
if(!hasF){elActiveFilters.innerHTML='';return}
const cn={};if(state.districtCol>=0)cn[state.districtCol]='Округ';
if(state.statusCol>=0)cn[state.statusCol]='Статус';if(state.yearCol>=0)cn[state.yearCol]='Год';
const tags=[];for(const[col,set]of state.filters){const g=cn[col]||state.headers[col]||`#${col}`;
for(const val of set)tags.push({col,val,group:g})}
if(state.search)tags.push({col:-1,val:state.search,group:'Поиск'});
const filtered=applyFilters(state.rows);
elActiveFilters.innerHTML=`<div class="active-filters">
<span class="active-filters-label">🔽 Фильтры (${filtered.length} ${pluralRow(filtered.length)}):</span>
${tags.map(t=>`<span class="active-tag" data-col="${t.col}" data-val="${escHtml(t.val)}">
<span class="tag-group">${escHtml(t.group)}:</span> ${escHtml(t.val)}
<button class="tag-remove" title="Убрать">×</button></span>`).join('')}</div>`;
elActiveFilters.querySelectorAll('.tag-remove').forEach(btn=>btn.addEventListener('click',e=>{
e.stopPropagation();const tag=btn.closest('.active-tag');const col=+tag.dataset.col;const val=tag.dataset.val;
if(col===-1){state.search='';elSearch.value=''}else{const set=state.filters.get(col);
if(set){set.delete(val);if(!set.size)state.filters.delete(col)}}onFiltersChanged(false)}))}

function renderTable(){const{headers,rows,numericCols,sortCol,sortDir,statusCol}=state;
const visible=applySort(applyFilters(rows));
elHead.innerHTML=`<tr><th>#</th>${headers.map((h,i)=>{const isNum=numericCols.has(i);const isSorted=sortCol===i;
const arrow=isSorted?(sortDir==='asc'?'▲':'▼'):'⇅';
return`<th class="${isNum?'numeric':''} ${isSorted?'sorted':''}" data-col="${i}" title="Сортировать">
${escHtml(h)}<span class="sort-ind">${arrow}</span></th>`}).join('')}</tr>`;
elHead.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>{
const col=+th.dataset.col;if(state.sortCol===col)state.sortDir=state.sortDir==='asc'?'desc':'asc';
else{state.sortCol=col;state.sortDir='asc'}renderTable()}));
if(!visible.length){elBody.innerHTML='<tr><td colspan="999"><div class="empty-state"><div class="icon">🔍</div><div>Ничего не найдено по текущим фильтрам</div></div></td></tr>'}
else{elBody.innerHTML=visible.map((row,idx)=>`<tr><td class="row-num">${idx+1}</td>
${headers.map((_,ci)=>{const v=row[ci]!==undefined?row[ci]:'';const num=numericCols.has(ci);
if(ci===statusCol&&v){const k=statusKind(v);return`<td title="${escHtml(v)}"><span class="status-badge ${k}">${escHtml(v)}</span></td>`}
const d=num&&toNumber(v)!=null?fmtFull(toNumber(v)):v;
return`<td class="${num?'numeric':''}" title="${escHtml(v)}">${escHtml(d)}</td>`}).join('')}</tr>`).join('')}
const total=rows.length;elRowCount.innerHTML=visible.length===total
?`Показано <strong>${fmtFull(total)}</strong> ${pluralRow(total)}, <strong>${headers.length}</strong> столбцов`
:`Показано <strong>${fmtFull(visible.length)}</strong> из <strong>${fmtFull(total)}</strong> ${pluralRow(total)}`}

function renderAll(){refreshCallbacks.length=0;renderKPIs();renderFilters();renderDonut();
renderStatusGroups();renderRatings();renderActiveFilters();renderTable();
elClearBtn.hidden=!(state.filters.size>0||state.search)}

async function fetchData(){elSpinner.classList.add('active');elStatus.className='status-ok';elStatus.textContent='●';
try{const res=await fetch(`${CSV_URL}&_=${Date.now()}`,{cache:'no-store'});
if(!res.ok)throw new Error(`HTTP ${res.status}`);const text=await res.text();
if(!text.trim())throw new Error('Пустой ответ');const parsed=parseCSV(text);
if(parsed.length<2)throw new Error('Нет данных');
state.headers=parsed[0];state.rows=parsed.slice(1);state.numericCols=detectNumericCols(state.headers,state.rows);
state.districtCol=findColumn('округ');state.statusCol=findColumn('статус');
state.yearCol=findColumn('дотац','год');state.volumeCol=findColumn('объем','объём','куб.м','куб');
state.costCol=findColumn('стоимость','стоим');
state.statusCaseMap=new Map();if(state.statusCol>=0)for(const r of state.rows){const v=(r[state.statusCol]||'').trim();if(v)state.statusCaseMap.set(norm(v),v)}
renderAll();elErrBar.classList.remove('visible');elStatus.className='status-ok';elStatus.textContent='✔'}
catch(err){console.error('[Dashboard]',err);elErrMsg.textContent=`Ошибка: ${err.message}`;
elErrBar.classList.add('visible');elStatus.className='status-err';elStatus.textContent='✖'}
finally{elSpinner.classList.remove('active');elLastUpd.textContent=new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}}

let countdownSec=REFRESH_INTERVAL/1000;
function startCountdown(){countdownSec=REFRESH_INTERVAL/1000;
const t=setInterval(()=>{countdownSec--;if(countdownSec<=0){clearInterval(t);elNextUpd.textContent='…'}
else elNextUpd.textContent=`${countdownSec} с`},1000);return t}

elSearch.addEventListener('input',e=>{state.search=e.target.value;onFiltersChanged(false)});
elClearBtn.addEventListener('click',clearAllFilters);

fetchData();let timer=startCountdown();
setInterval(()=>{fetchData();clearInterval(timer);timer=startCountdown()},REFRESH_INTERVAL);
</script>
</body>
</html>
